name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Pagefold.slnx

      - name: Build
        run: dotnet build Pagefold.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Pagefold.slnx --configuration Release --no-build

      - name: Publish
        run: dotnet publish .\Pagefold.App\Pagefold.App.csproj --configuration Release --runtime win-x64 --self-contained false --no-build --output .\artifacts\Pagefold-win-x64
